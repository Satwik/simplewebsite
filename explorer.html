<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ETF Explorer — India ETF Explorer</title>
<meta name="description" content="Explore ETFs listed on NSE India. Filter by category, view performance, and get AI-powered plain-English explanations."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,700&display=swap" rel="stylesheet">
<style>
/* ── M3 Token System (matches landing page) ──────────────── */
:root {
  --md-primary:              #E65100;
  --md-on-primary:           #FFFFFF;
  --md-primary-container:    #FFE0CC;
  --md-on-primary-container: #5C1A00;
  --md-secondary:            #1565C0;
  --md-secondary-container:  #D6E4FF;
  --md-on-secondary-container:#001E5C;
  --md-tertiary:             #2E7D32;
  --md-tertiary-container:   #C8F5CB;
  --md-error:                #B71C1C;
  --md-surface:              #FFF8F5;
  --md-surface-variant:      #F3E5D8;
  --md-on-surface:           #201A17;
  --md-on-surface-variant:   #52443C;
  --md-outline:              #857468;
  --md-outline-variant:      #D8C2B5;
  --md-shadow:               rgba(32,26,23,.10);
  --md-inverse-surface:      #362F2C;
  --md-inverse-on-surface:   #FBEEEA;
  --md-surface-1: color-mix(in srgb, var(--md-primary) 5%,  var(--md-surface));
  --md-surface-2: color-mix(in srgb, var(--md-primary) 8%,  var(--md-surface));
  --radius-xs:4px; --radius-s:8px; --radius-m:12px;
  --radius-l:16px; --radius-xl:24px; --radius-full:50px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--md-surface);color:var(--md-on-surface);overflow-x:hidden;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--md-surface-variant)}
::-webkit-scrollbar-thumb{background:var(--md-outline);border-radius:3px}

@keyframes spin   {0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes fadeIn {from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse  {0%,100%{box-shadow:0 0 0 0 rgba(230,81,0,.35)}50%{box-shadow:0 0 0 10px rgba(230,81,0,0)}}
.spin{animation:spin 1s linear infinite;display:inline-block;color:var(--md-primary)}
.panel-enter{animation:fadeIn .28s cubic-bezier(.22,1,.36,1)}

/* ── Nav ───────────────────────────────────────────────── */
.m3-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(255,248,245,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--md-outline-variant);
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}
.nav-logo img{display:block;flex-shrink:0}
.nav-meta{font-size:10px;color:var(--md-outline);white-space:nowrap}
.nav-brand{font-family:'Fraunces',serif;font-weight:700;font-size:17px;color:var(--md-primary)}
.nav-meta{font-size:10px;color:var(--md-outline);margin-top:1px}
.nav-right{display:flex;gap:8px;align-items:center}
.nav-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:none;border:1px solid var(--md-outline-variant);
  padding:7px 14px;border-radius:var(--radius-full);
  font-size:12px;font-weight:600;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;color:var(--md-outline);
  text-decoration:none;transition:all .15s ease;
}
.nav-btn:hover{background:var(--md-surface-variant);color:var(--md-primary);border-color:var(--md-primary)}
.nav-btn.primary{background:var(--md-primary);color:#fff;border-color:var(--md-primary)}
.nav-btn.primary:hover{filter:brightness(1.08)}

/* ── Loading / Error ───────────────────────────────────── */
.state-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:60px 20px;text-align:center;min-height:calc(100vh - 64px)}
.state-title{font-family:'Fraunces',serif;font-size:24px;font-weight:800;margin-bottom:8px}
.state-sub{font-size:14px;color:var(--md-on-surface-variant);max-width:400px;line-height:1.7}
.error-box{max-width:520px;width:100%;background:#fff;border:1px solid var(--md-outline-variant);border-radius:var(--radius-xl);padding:32px 28px;text-align:left;box-shadow:0 2px 12px var(--md-shadow)}
.step-num-badge{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:var(--md-primary-container);color:var(--md-on-primary-container);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}
.pick-btn{width:100%;background:var(--md-primary);color:#fff;border:none;border-radius:var(--radius-l);padding:14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;animation:pulse 2.5s infinite;transition:all .2s}
.pick-btn:hover{filter:brightness(1.08);animation:none;transform:translateY(-1px)}

/* ── Layout ────────────────────────────────────────────── */
.explorer-wrap{display:flex;flex:1;height:calc(100vh - 64px);overflow:hidden}
.explorer-left{flex:1;overflow:auto;padding:20px 20px 40px}

/* ── Filters ───────────────────────────────────────────── */
.filter-lbl{font-size:10px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--md-outline);margin-bottom:8px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.m3-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 14px 6px 12px;border-radius:var(--radius-full);
  border:1px solid transparent;background:var(--md-surface-variant);
  cursor:pointer;transition:all .15s ease;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;
  color:var(--md-on-surface-variant);
}
.m3-chip:hover{filter:brightness(.95)}
.chip-count{font-size:10px;opacity:.65;font-weight:700}
.filter-row2{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:8px}
.filter-group>label{display:block;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--md-outline);margin-bottom:6px}
.pill-row{display:flex;gap:5px;flex-wrap:wrap}
.m3-pill{
  padding:5px 12px;border-radius:var(--radius-s);
  border:1px solid var(--md-outline-variant);
  background:transparent;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;
  color:var(--md-on-surface-variant);transition:all .15s ease;
}
.m3-pill:hover{background:var(--md-surface-variant)}
.m3-pill.active{background:var(--md-inverse-surface);color:var(--md-inverse-on-surface);border-color:var(--md-inverse-surface)}
.result-count{font-size:11px;color:var(--md-outline);margin-bottom:12px}

/* ── ETF Cards ─────────────────────────────────────────── */
.etf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:12px}
.etf-card{
  background:#fff;border:1px solid var(--md-outline-variant);
  border-radius:var(--radius-xl);padding:16px;cursor:pointer;
  transition:transform .2s cubic-bezier(.22,1,.36,1),box-shadow .2s,border-color .2s;
  position:relative;overflow:hidden;
}
.etf-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px var(--md-shadow);border-color:var(--md-outline)}
.etf-card.active{border-color:var(--md-primary);box-shadow:0 0 0 2px rgba(230,81,0,.15)}
.ec-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ec-sym{font-family:'Fraunces',serif;font-size:16px;font-weight:800;letter-spacing:-.2px}
.ec-asset{font-size:10px;color:var(--md-outline);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.ec-badge{border-radius:var(--radius-full);padding:3px 10px;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;flex-shrink:0;margin-left:6px}
.ec-price-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.ec-price{font-family:'Fraunces',serif;font-size:20px;font-weight:700}
.ec-pct{font-size:12px;font-weight:700}
.ec-range{margin-bottom:10px}
.ec-bar{height:4px;background:var(--md-surface-variant);border-radius:2px;position:relative}
.ec-bar-fill{position:absolute;left:0;height:100%;border-radius:2px}
.ec-bar-dot{position:absolute;top:-4px;width:12px;height:12px;border-radius:50%;background:var(--md-on-surface);transform:translateX(-50%);border:2px solid #fff;box-shadow:0 1px 3px var(--md-shadow)}
.ec-range-lbls{display:flex;justify-content:space-between;font-size:9px;color:var(--md-outline);margin-top:4px}
.ec-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.ec-stat{background:var(--md-surface-1);border-radius:var(--radius-s);padding:5px 7px}
.ec-stat-lbl{font-size:8px;color:var(--md-outline);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.ec-stat-val{font-size:11px;font-weight:700}
.empty-grid-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--md-outline)}
.empty-icon{font-size:40px;margin-bottom:14px}
.empty-title{font-family:'Fraunces',serif;font-size:18px;font-weight:700;margin-bottom:6px;color:var(--md-on-surface)}
.empty-sub{font-size:13px}

/* ── Detail Panel ──────────────────────────────────────── */
.detail-panel{width:360px;flex-shrink:0;border-left:1px solid var(--md-outline-variant);background:#fff;overflow:auto;padding:22px 20px 40px}
.dp-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.dp-sym{font-family:'Fraunces',serif;font-size:22px;font-weight:900;margin-bottom:4px}
.dp-asset{font-size:12px;color:var(--md-on-surface-variant);line-height:1.5;padding-right:8px}
.dp-cat-row{margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dp-close{background:none;border:none;color:var(--md-outline);font-size:24px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;transition:color .15s}
.dp-close:hover{color:var(--md-on-surface)}
.dp-price-card{background:var(--md-surface-1);border:1px solid var(--md-outline-variant);border-radius:var(--radius-xl);padding:18px;margin-bottom:12px}
.dp-price-main{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.dp-price-big{font-family:'Fraunces',serif;font-size:28px;font-weight:900}
.dp-pct-big{font-size:15px;font-weight:700}
.dp-prev{font-size:10px;color:var(--md-outline);margin-bottom:12px}
.dp-range-lbls{display:flex;justify-content:space-between;font-size:9px;color:var(--md-outline);margin-bottom:5px}
.dp-range-track{height:6px;background:var(--md-surface-variant);border-radius:3px;position:relative}
.dp-range-grad{position:absolute;left:0;height:100%;background:linear-gradient(to right,#B71C1C,#F57C00,#2E7D32);border-radius:3px}
.dp-range-dot{position:absolute;top:-4px;width:14px;height:14px;border-radius:50%;background:var(--md-on-surface);transform:translateX(-50%);border:2.5px solid #fff;box-shadow:0 2px 6px var(--md-shadow)}
.dp-range-note{font-size:9px;color:var(--md-outline);text-align:center;margin-top:6px}
.dp-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.dp-stat{background:var(--md-surface-1);border:1px solid var(--md-outline-variant);border-radius:var(--radius-l);padding:10px 12px}
.dp-stat-lbl{font-size:10px;color:var(--md-outline);margin-bottom:4px;font-weight:600}
.dp-stat-val{font-size:14px;font-weight:700}
.dp-ai-header{display:flex;align-items:center;gap:8px;padding-top:16px;border-top:1px solid var(--md-outline-variant);margin-bottom:14px}
.dp-ai-dot{width:28px;height:28px;border-radius:var(--radius-s);background:var(--md-primary-container);color:var(--md-on-primary-container);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.dp-ai-label{font-size:11px;font-weight:800;color:var(--md-primary);letter-spacing:1.2px;text-transform:uppercase}
.dp-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.dp-badge{border-radius:var(--radius-s);padding:5px 12px;font-size:11px;font-weight:700}
.dp-horiz{background:var(--md-secondary-container);color:var(--md-on-secondary-container);border-radius:var(--radius-s);padding:5px 12px;font-size:11px;font-weight:600}
.dp-ai-sec{margin-bottom:14px}
.dp-ai-sec-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--md-outline);margin-bottom:6px}
.dp-ai-body{font-size:13px;color:var(--md-on-surface-variant);line-height:1.65}
.dp-list-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.dp-list-item{display:flex;gap:8px;margin-bottom:7px;align-items:flex-start;font-size:13px;line-height:1.55;color:var(--md-on-surface-variant)}
.dp-dot{flex-shrink:0;margin-top:5px;width:7px;height:7px;border-radius:50%}
.dp-disc{background:var(--md-surface-variant);border-radius:var(--radius-m);padding:10px 12px;font-size:10px;color:var(--md-outline);line-height:1.6;margin-bottom:8px}
.dp-loading{text-align:center;padding:32px 0;color:var(--md-outline)}
.dp-loading-txt{font-size:13px;margin-top:10px}

@media(max-width:760px){
  .etf-grid{grid-template-columns:1fr 1fr}
  .detail-panel{position:fixed;bottom:0;left:0;right:0;width:100%!important;height:72vh;border-radius:24px 24px 0 0;z-index:200;overflow:auto;box-shadow:0 -8px 32px var(--md-shadow)}
}
@media(max-width:460px){.etf-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── CSV Parser ───────────────────────────────────────────
function parseCSVLine(line){const out=[];let cur='',q=false;for(const ch of line){if(ch==='"')q=!q;else if(ch===','&&!q){out.push(cur);cur='';}else cur+=ch;}out.push(cur);return out;}
function parseCSV(raw){
  const text=raw.replace(/^\uFEFF/,'');
  const lines=[];let line='',inQ=false;
  for(const ch of text){if(ch==='"'){inQ=!inQ;line+=ch;}else if(ch==='\n'&&!inQ){if(line.trim())lines.push(line);line='';}else if(ch!=='\r')line+=ch;}
  if(line.trim())lines.push(line);
  if(!lines.length)return[];
  const hdrs=parseCSVLine(lines[0]).map(h=>h.replace(/\s+/g,' ').trim());
  return lines.slice(1).map(l=>{const v=parseCSVLine(l);const r={};hdrs.forEach((h,i)=>r[h]=(v[i]||'').trim());return r;}).filter(r=>r['SYMBOL']&&r['SYMBOL']!=='-'&&r['SYMBOL']!=='');
}
function pn(s){if(!s||s==='-')return null;const n=parseFloat(String(s).replace(/,/g,''));return isNaN(n)?null:n;}
function fmtPrice(v){if(v===null)return'—';return'₹'+v.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtVol(s){const n=pn(s);if(n===null)return'—';if(n>=1e7)return(n/1e7).toFixed(1)+' Cr';if(n>=1e5)return(n/1e5).toFixed(1)+' L';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return String(n);}
function fmtPct(n){if(n===null)return'—';return(n>=0?'+':'')+n.toFixed(2)+'%';}

// ─── Category ─────────────────────────────────────────────
function getCategory(e){
  const a=(e['UNDERLYING ASSET']||'').toLowerCase(),s=(e['SYMBOL']||'').toLowerCase();
  if(a.includes('silver')||a.match(/commodity.?silver/))return'Silver';
  if(a.includes('gold')||s.includes('gold'))return'Gold';
  if(a.includes('1d rate')||a.includes('liquid')||a.includes('government securities')||a.includes('g-sec')||a.includes('gilt')||a.includes('sdl')||s.includes('liquid')||s.includes('liqgr')||a.includes('nifty1d'))return'Liquid/Debt';
  if(a.includes('nasdaq')||a.includes('fang+')||a.includes('hang seng')||a.includes('s&p 500')||a.includes('nyse'))return'International';
  if(a.includes('nifty bank')||a.includes('psu bank')||a.includes('private bank')||a.includes('top 10 bank'))return'Banking';
  if(a.includes('nifty it')||a.includes(' it index')||(s==='itbees'||s==='itietf'||s==='itetf'||s==='itadd'))return'IT';
  if(a.includes('pharma')||a.includes('healthcare')||a.includes('health'))return'Healthcare';
  if(a.includes('defence'))return'Defence';
  if(a.includes('fmcg'))return'FMCG';
  if(a.includes('metal')||a.includes('auto')||a.includes('automobile')||a.includes('energy')||a.includes('oil & gas')||a.includes('realty')||a.includes('power')||a.includes('capital market')||a.includes('ipo')||a.includes('consumption')||a.includes('manufacturing')||a.includes(' mnc ')||a.includes('services sector'))return'Sectoral';
  if(a.includes('pse')||a.includes('cpse')||a.includes('bharat 22')||a.includes('psu'))return'PSU/Govt';
  if(a.includes('midcap')||a.includes('mid cap'))return'Midcap';
  if(a.includes('smallcap')||a.includes('small cap')||a.includes('sml'))return'Smallcap';
  return'Index';
}

// M3 tonal palette — light theme, plain-English labels
const CAT={
  'All':          {color:'#5C4033',bg:'#F3E5D8', chip:'🗂 All ETFs',         label:'Browse every ETF available on NSE India'},
  'Gold':         {color:'#7B5800',bg:'#FFF0CC', chip:'🥇 Gold',             label:'Invest in Gold without buying physical gold'},
  'Silver':       {color:'#424F5A',bg:'#E4EDF4', chip:'🥈 Silver',           label:'Invest in Silver without buying physical silver'},
  'Index':        {color:'#4A1680',bg:'#EDE0FF', chip:'📈 Whole Market',     label:'Tracks Nifty 50 / Sensex — India\'s top companies in one shot'},
  'Banking':      {color:'#005140',bg:'#C8F5E8', chip:'🏦 Banks',            label:'Top Indian banks like SBI, HDFC, ICICI bundled together'},
  'IT':           {color:'#00376C',bg:'#D1E4FF', chip:'💻 Tech Companies',   label:'India\'s top software & IT companies like Infosys, TCS, Wipro'},
  'Healthcare':   {color:'#7D0028',bg:'#FFD9E2', chip:'💊 Hospitals & Pharma',label:'Medicine, hospitals & pharma companies like Sun Pharma, Apollo'},
  'Defence':      {color:'#6A3A00',bg:'#FFE1BB', chip:'🛡 Defence',          label:'Companies that make defence equipment for India'},
  'Liquid/Debt':  {color:'#004770',bg:'#CCE5FF', chip:'🏦 Safe Parking',     label:'Like a savings account — park money safely with small returns'},
  'International':{color:'#3B008B',bg:'#E8DEFF', chip:'🌍 Global Markets',   label:'Invest in US, China, Europe — beyond Indian stocks'},
  'Midcap':       {color:'#8B3A00',bg:'#FFE2CC', chip:'🏢 Medium Companies', label:'Mid-size growing companies — higher growth, slightly more risk'},
  'Smallcap':     {color:'#8B0000',bg:'#FFD8D8', chip:'🏪 Small Companies',  label:'Small but growing companies — high growth potential, higher risk'},
  'PSU/Govt':     {color:'#0A3D0C',bg:'#C8F5CB', chip:'🏛 Govt Companies',  label:'Government-owned companies like ONGC, Coal India, BHEL'},
  'FMCG':         {color:'#1B5E20',bg:'#D3FFDB', chip:'🛒 Everyday Brands', label:'Companies making daily-use products — HUL, Nestle, Dabur'},
  'Sectoral':     {color:'#6A2300',bg:'#FFE5D3', chip:'⚙️ Other Sectors',    label:'Auto, Energy, Metals, Real Estate & more sector-specific ETFs'},
};
const cs=c=>CAT[c]||CAT['All'];
const CATS=['All','Gold','Silver','Index','Banking','IT','Healthcare','Defence','Liquid/Debt','International','Midcap','Smallcap','PSU/Govt','FMCG','Sectoral'];
const SORTS=[['value','Most Popular'],['volume','Most Traded Today'],['pct','Up / Down Today'],['r1y','Best Last 1 Year'],['r30d','Best Last 30 Days']];

// ─── State ────────────────────────────────────────────────
let S={etfs:[],dataDate:null,fileName:'etf.csv',loading:true,fetchError:null,category:'All',sort:'value',selected:null,aiCache:{},aiLoading:false};
function ss(p){Object.assign(S,p);render();}
function gc(n){return n===null?'var(--md-outline)':n>=0?'#2E7D32':'#B71C1C';}

// ─── Filter + Sort ────────────────────────────────────────
function filtered(){
  let list=S.etfs.filter(e=>{
    const cat=getCategory(e);
    if(S.category!=='All'&&cat!==S.category)return false;
    return true;
  });
  list.sort((a,b)=>{
    if(S.sort==='value')return(pn(b['VALUE (₹ Crores)'])||0)-(pn(a['VALUE (₹ Crores)'])||0);
    if(S.sort==='volume')return(pn(b['VOLUME'])||0)-(pn(a['VOLUME'])||0);
    if(S.sort==='pct')return(pn(b['%CHNG'])??-999)-(pn(a['%CHNG'])??-999);
    if(S.sort==='r1y')return(pn(b['365 D   %CHNG'])??pn(b['365 D %CHNG'])??-999)-(pn(a['365 D   %CHNG'])??pn(a['365 D %CHNG'])??-999);
    if(S.sort==='r30d')return(pn(b['30D  %CHNG'])??pn(b['30D %CHNG'])??-999)-(pn(a['30D  %CHNG'])??pn(a['30D %CHNG'])??-999);
    return 0;
  });
  return list;
}

// ─── AI ───────────────────────────────────────────────────
async function fetchAI(etf){
  const sym=etf['SYMBOL'];
  if(S.aiCache[sym]||S.aiLoading)return;
  ss({aiLoading:true});
  const cat=getCategory(etf);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:900,
      messages:[{role:'user',content:`You are explaining ETFs to a first-time Indian investor who has zero knowledge of stock markets or finance. Use very simple everyday language — like explaining to a friend over tea. Avoid all jargon.\n\nETF Symbol: ${sym}\nTracks: ${etf['UNDERLYING ASSET']}\nCategory: ${cat}\nCurrent Price: ₹${etf['LTP']}\nToday's Change: ${etf['%CHNG']}%\n30-Day Return: ${etf['30D  %CHNG']||etf['30D %CHNG']||'-'}%\n1-Year Return: ${etf['365 D   %CHNG']||etf['365 D %CHNG']||'-'}%\n52W High: ₹${etf['52W H']}\n52W Low: ₹${etf['52W L']}\nTraded Value: ₹${etf['VALUE (₹ Crores)']} Crores\n\nReturn ONLY valid JSON (no markdown):\n{"what":"2-3 sentences in plain Hindi-English mix or simple English: what does this ETF actually invest in, explained like explaining to a beginner","suitable_for":"1-2 sentences: who is this best for — salaried person, retired person, someone saving for 5 years etc","pros":["simple benefit 1","simple benefit 2","simple benefit 3"],"cons":["simple risk 1 in plain words","simple risk 2 in plain words","simple risk 3 in plain words"],"risk_level":"Low","investment_horizon":"Long-term (5+ years)"}`}]
    })});
    const data=await res.json();
    const txt=data.content?.[0]?.text||'{}';
    const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    ss({aiCache:{...S.aiCache,[sym]:parsed},aiLoading:false});
  }catch{ss({aiCache:{...S.aiCache,[sym]:{error:true}},aiLoading:false});}
}

// ─── File Loading ─────────────────────────────────────────
function loadFromText(text,name){
  const rows=parseCSV(text);
  const date=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  ss({etfs:rows,dataDate:date,fileName:name||'etf.csv',loading:false,fetchError:null,selected:null,category:'All',aiCache:{}});
}
function loadFile(file){const r=new FileReader();r.onload=e=>loadFromText(e.target.result,file.name);r.readAsText(file);}
async function autoLoad(){
  if(location.protocol==='file:'){ss({loading:false,fetchError:'local'});return;}
  try{
    const res=await fetch('etf.csv?_='+Date.now());
    if(!res.ok)throw new Error();
    loadFromText(await res.text(),'etf.csv');
  }catch{ss({loading:false,fetchError:'server'});}
}

// ─── Element builder ──────────────────────────────────────
function el(tag,cls,children,style){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(style)Object.assign(e.style,style);
  if(Array.isArray(children))children.forEach(c=>{if(c!=null)e.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  else if(children!=null)e.appendChild(typeof children==='string'?document.createTextNode(children):children);
  return e;
}
function attr(e,k,v){e.setAttribute(k,v);return e;}
function on(e,ev,fn){e.addEventListener(ev,fn);return e;}
function sty(e,obj){Object.assign(e.style,obj);return e;}
function txt(e,t){e.textContent=t;return e;}

// ─── Render ───────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  const wrap=el('div','',null,{display:'flex',flexDirection:'column',minHeight:'100vh'});
  wrap.appendChild(buildNav());
  if(S.loading)wrap.appendChild(buildLoading());
  else if(S.fetchError||S.etfs.length===0)wrap.appendChild(buildError());
  else wrap.appendChild(buildExplorer());
  app.appendChild(wrap);
}

// ─── Nav ──────────────────────────────────────────────────
function buildNav(){
  const nav=el('nav','m3-nav');

  // Logo — links back to landing page
  const logo=attr(el('a','nav-logo'),'href','index.html');
  const logoImg=document.createElement('img');
  logoImg.src='logo.png'; logoImg.alt='ETF India';
  logoImg.style.cssText='height:44px;width:auto;display:block;';
  const meta=el('div','nav-meta');
  meta.textContent=S.etfs.length>0?`${S.dataDate}  ·  ${S.etfs.length} ETFs`:S.loading?'Loading…':'';
  logo.appendChild(logoImg); logo.appendChild(meta);

  // Right controls
  const right=el('div','nav-right');
  const rb=el('button','nav-btn','↻ Reload');
  on(rb,'click',()=>{ss({loading:true,fetchError:null});autoLoad();});
  const back=attr(el('a','nav-btn','← Home'),'href','index.html');
  right.appendChild(rb); right.appendChild(back);

  nav.appendChild(logo); nav.appendChild(right);
  return nav;
}

// ─── Loading ──────────────────────────────────────────────
function buildLoading(){
  const w=el('div','state-wrap');
  const sp=el('div','spin','⟳',{fontSize:'40px',display:'block',marginBottom:'20px'});
  const ti=el('div','state-title','Loading ETF data…');
  const su=el('div','state-sub','Reading etf.csv from the same folder as this page.');
  w.appendChild(sp);w.appendChild(ti);w.appendChild(su);
  return w;
}

// ─── Error ────────────────────────────────────────────────
function buildError(){
  const isLocal=S.fetchError==='local';
  const w=el('div','state-wrap');
  const box=el('div','error-box');
  const ico=el('div','',null,{fontSize:'40px',marginBottom:'16px',textAlign:'center'});ico.textContent=isLocal?'💻':'⚠️';
  const ti=el('div','',null,{fontFamily:'Fraunces,serif',fontWeight:'800',fontSize:'22px',marginBottom:'10px',textAlign:'center'});
  ti.textContent=isLocal?'Opened locally — pick the file':'Could not find etf.csv';
  const su=el('div','',null,{fontSize:'13px',color:'var(--md-on-surface-variant)',marginBottom:'24px',lineHeight:'1.8',textAlign:'center'});
  su.textContent=isLocal?'Browsers block auto-loading when a file is opened directly. Click below to pick etf.csv.':'Make sure etf.csv is in the same folder as this page on your server.';
  box.appendChild(ico);box.appendChild(ti);box.appendChild(su);
  const fi=document.createElement('input');fi.type='file';fi.accept='.csv';fi.style.display='none';fi.id='csvPicker';
  fi.addEventListener('change',ev=>{const f=ev.target.files[0];if(f)loadFile(f);ev.target.value='';});
  box.appendChild(fi);
  const pb=el('button','pick-btn','📂  Pick etf.csv from my computer');
  on(pb,'click',()=>document.getElementById('csvPicker').click());
  box.appendChild(pb);
  const steps=isLocal?[['1','Place index.html, explorer.html and etf.csv in the same folder'],['2','Install VS Code + "Live Server" extension (free, one-time)'],['3','Right-click index.html → "Open with Live Server" — auto-loads every time']]:
                      [['1','Log in to GoDaddy cPanel → File Manager → public_html'],['2','Upload etf.csv alongside index.html and explorer.html'],['3','Refresh this page — it loads automatically']];
  const sl=el('div','',null,{marginTop:'20px',borderTop:'1px solid var(--md-outline-variant)',paddingTop:'20px'});
  const slTitle=el('div','',null,{fontSize:'10px',fontWeight:'700',color:'var(--md-primary)',letterSpacing:'1.2px',textTransform:'uppercase',marginBottom:'14px'});
  slTitle.textContent=isLocal?'To make it auto-load':'Fix on GoDaddy';
  sl.appendChild(slTitle);
  steps.forEach(([n,t])=>{
    const row=el('div','',null,{display:'flex',gap:'12px',marginBottom:'11px',alignItems:'flex-start'});
    const nb2=el('div','step-num-badge',n);
    const td=el('div','',null,{fontSize:'13px',color:'var(--md-on-surface-variant)',lineHeight:'1.6'});td.textContent=t;
    row.appendChild(nb2);row.appendChild(td);sl.appendChild(row);
  });
  box.appendChild(sl);w.appendChild(box);
  return w;
}

// ─── Explorer ─────────────────────────────────────────────
function buildExplorer(){
  const wrap=el('div','explorer-wrap');
  const left=el('div','explorer-left');
  left.appendChild(buildFilters());
  const list=filtered();
  const rc=el('div','result-count');
  rc.textContent=list.length===0?'No ETFs found for this category':`Showing ${list.length} ETF${list.length!==1?'s':''} — click any card to learn more`;
  left.appendChild(rc);
  left.appendChild(buildGrid(list));
  wrap.appendChild(left);
  if(S.selected)wrap.appendChild(buildDetailPanel(S.selected));
  return wrap;
}

// ─── Filters ─────────────────────────────────────────────
function buildFilters(){
  const wrap=el('div','',null,{marginBottom:'16px'});

  // Category chips label
  const cl=el('div','filter-lbl','What are you interested in?');wrap.appendChild(cl);

  // Category description hint — updates when a category is active
  const hintBar=el('div','',null,{
    fontSize:'12px',color:'var(--md-on-surface-variant)',background:'var(--md-surface-1)',
    border:'1px solid var(--md-outline-variant)',borderRadius:'var(--radius-m)',
    padding:'8px 14px',marginBottom:'10px',lineHeight:'1.5',
    display: S.category==='All'?'none':'block'
  });
  hintBar.id='cat-hint';
  if(S.category!=='All') hintBar.textContent='ℹ️  '+cs(S.category).label;
  wrap.appendChild(hintBar);

  const chipRow=el('div','chip-row');
  CATS.filter(c=>c==='All'||S.etfs.some(e=>getCategory(e)===c)).forEach(c=>{
    const st=cs(c);const active=S.category===c;
    const count=c==='All'?S.etfs.length:S.etfs.filter(e=>getCategory(e)===c).length;
    const chip=el('button','m3-chip');
    chip.title=st.label;
    sty(chip,{background:active?st.color:st.bg,borderColor:active?st.color:'transparent',color:active?'#fff':st.color,fontWeight:active?'700':'600'});
    chip.appendChild(document.createTextNode(st.chip));
    if(c!=='All'){
      const cnt=el('span','chip-count',' '+String(count));chip.appendChild(cnt);
    }
    on(chip,'click',()=>ss({category:c,selected:null}));
    chipRow.appendChild(chip);
  });
  wrap.appendChild(chipRow);

  // Sort only (no Show/perf)
  const sortG=el('div','filter-group',null,{marginTop:'10px'});
  const sortLbl=document.createElement('label');
  sortLbl.textContent='Sort by';sortG.appendChild(sortLbl);
  const sortP=el('div','pill-row');
  SORTS.forEach(([k,lbl])=>{
    const b=el('button','m3-pill'+(S.sort===k?' active':''),lbl);
    on(b,'click',()=>ss({sort:k}));
    sortP.appendChild(b);
  });
  sortG.appendChild(sortP);
  wrap.appendChild(sortG);
  return wrap;
}

// ─── Grid ─────────────────────────────────────────────────
function buildGrid(list){
  const grid=el('div','etf-grid');
  if(!list.length){
    const emp=el('div','empty-grid-state');
    emp.appendChild(el('div','empty-icon','🔍'));
    emp.appendChild(el('div','empty-title','No ETFs match your filters'));
    emp.appendChild(el('div','empty-sub','Try changing the category, performance filter, or sort'));
    grid.appendChild(emp);
  }else list.forEach(etf=>grid.appendChild(buildCard(etf)));
  return grid;
}

function buildCard(etf){
  const sym=etf['SYMBOL'],cat=getCategory(etf),st=cs(cat);
  const ltp=pn(etf['LTP']),pct=pn(etf['%CHNG']);
  const h52=pn(etf['52W H']),l52=pn(etf['52W L']);
  const d30=pn(etf['30D  %CHNG'])??pn(etf['30D %CHNG']);
  const d365=pn(etf['365 D   %CHNG'])??pn(etf['365 D %CHNG']);
  const rp=(ltp&&h52&&l52&&h52!==l52)?Math.max(0,Math.min(100,((ltp-l52)/(h52-l52))*100)):null;
  const isActive=S.selected&&S.selected['SYMBOL']===sym;

  const card=el('div','etf-card'+(isActive?' active':''));
  on(card,'click',()=>{ss({selected:etf});fetchAI(etf);});

  // Top
  const top=el('div','ec-top');
  const topL=el('div','',null,{flex:'1',minWidth:'0'});
  topL.appendChild(el('div','ec-sym',sym));
  const asset=el('div','ec-asset');asset.textContent=etf['UNDERLYING ASSET']||'';topL.appendChild(asset);
  const badge=el('span','ec-badge',st.chip);sty(badge,{background:st.bg,color:st.color});
  top.appendChild(topL);top.appendChild(badge);card.appendChild(top);

  // Price
  const pr=el('div','ec-price-row');
  pr.appendChild(el('div','ec-price',fmtPrice(ltp)));
  const pctEl=el('div','ec-pct');sty(pctEl,{color:gc(pct)});
  pctEl.textContent=pct!==null?(pct>=0?'▲ ':'▼ ')+Math.abs(pct).toFixed(2)+'%':'—';
  pr.appendChild(pctEl);card.appendChild(pr);

  // Range bar
  if(rp!==null){
    const rng=el('div','ec-range');
    const bar=el('div','ec-bar');
    const fill=el('div','ec-bar-fill');sty(fill,{width:rp+'%',background:pct!==null&&pct>=0?'#2E7D32':'#B71C1C'});
    const dot=el('div','ec-bar-dot');sty(dot,{left:rp+'%'});
    bar.appendChild(fill);bar.appendChild(dot);rng.appendChild(bar);
    const rl=el('div','ec-range-lbls');
    rl.appendChild(el('span','','L ₹'+(l52?.toFixed(0)||'?')));
    rl.appendChild(el('span','','H ₹'+(h52?.toFixed(0)||'?')));
    rng.appendChild(rl);card.appendChild(rng);
  }

  // Stats
  const stats=el('div','ec-stats');
  [['30 Days',d30,true],['1 Year',d365,true],['₹ Traded',etf['VALUE (₹ Crores)'],false]].forEach(([lbl,val,isPct])=>{
    const c=el('div','ec-stat');
    const l=el('div','ec-stat-lbl',lbl);
    const v=el('div','ec-stat-val');
    sty(v,{color:isPct?gc(val):'var(--md-on-surface)'});
    v.textContent=isPct?(val!==null?(val>=0?'+':'')+val.toFixed(2)+'%':'—'):(val&&val!=='-'?'₹'+val:'—');
    c.appendChild(l);c.appendChild(v);stats.appendChild(c);
  });
  card.appendChild(stats);
  return card;
}

// ─── Detail Panel ─────────────────────────────────────────
function buildDetailPanel(etf){
  const sym=etf['SYMBOL'],cat=getCategory(etf),st=cs(cat);
  const ltp=pn(etf['LTP']),pct=pn(etf['%CHNG']);
  const h52=pn(etf['52W H']),l52=pn(etf['52W L']);
  const d30=pn(etf['30D  %CHNG'])??pn(etf['30D %CHNG']);
  const d365=pn(etf['365 D   %CHNG'])??pn(etf['365 D %CHNG']);

  const panel=el('div','detail-panel panel-enter');attr(panel,'id','detail-panel');

  // Header
  const hd=el('div','dp-hd');
  const hl=el('div','',null,{flex:'1',minWidth:'0'});
  hl.appendChild(el('div','dp-sym',sym));
  const das=el('div','dp-asset');das.textContent=etf['UNDERLYING ASSET']||'';hl.appendChild(das);
  const catRow=el('div','dp-cat-row');
  const cb=el('span','ec-badge',st.chip);sty(cb,{background:st.bg,color:st.color,padding:'4px 12px',fontSize:'10px'});
  const cbLbl=el('span','',null,{fontSize:'10px',color:'var(--md-outline)'});cbLbl.textContent=st.label;
  catRow.appendChild(cb);catRow.appendChild(cbLbl);hl.appendChild(catRow);
  const closeBtn=el('button','dp-close','×');on(closeBtn,'click',()=>ss({selected:null}));
  hd.appendChild(hl);hd.appendChild(closeBtn);panel.appendChild(hd);

  // Price card
  const pc=el('div','dp-price-card');
  const pm=el('div','dp-price-main');
  pm.appendChild(el('div','dp-price-big',fmtPrice(ltp)));
  const pb=el('div','dp-pct-big');sty(pb,{color:gc(pct)});
  pb.textContent=pct!==null?(pct>=0?'▲ Up ':' ▼ Down ')+Math.abs(pct).toFixed(2)+'% today':'—';
  pm.appendChild(pb);pc.appendChild(pm);
  const prev=el('div','dp-prev');prev.textContent=`Yesterday's close: ₹${etf['PREV. CLOSE']||'—'}  ·  NAV (fund value): ₹${etf['NAV']||'—'}`;
  pc.appendChild(prev);

  if(h52&&l52&&ltp){
    const pos=Math.max(0,Math.min(100,((ltp-l52)/(h52-l52))*100));
    const rl=el('div','dp-range-lbls');
    rl.appendChild(el('span','','Lowest in 1 year: ₹'+l52.toFixed(2)));
    rl.appendChild(el('span','','Highest in 1 year: ₹'+h52.toFixed(2)));pc.appendChild(rl);
    const track=el('div','dp-range-track');
    const grad=el('div','dp-range-grad');sty(grad,{width:pos+'%'});
    const dot=el('div','dp-range-dot');sty(dot,{left:pos+'%'});
    track.appendChild(grad);track.appendChild(dot);pc.appendChild(track);
    const note=el('div','dp-range-note');note.textContent=`Price is at ${pos.toFixed(0)}% of its highest point in the last year`;pc.appendChild(note);
  }
  panel.appendChild(pc);

  // Stats
  const sg=el('div','dp-stats');
  [['Return in 30 Days',d30,true],['Return in 1 Year',d365,true],
   ['How much is traded daily',fmtVol(etf['VOLUME']),false],
   ['Total money invested today',etf['VALUE (₹ Crores)']&&etf['VALUE (₹ Crores)']!=='-'?'₹'+etf['VALUE (₹ Crores)']+' Cr':'—',false]
  ].forEach(([lbl,val,isPct])=>{
    const c=el('div','dp-stat');
    const l=el('div','dp-stat-lbl',lbl);
    const v=el('div','dp-stat-val');sty(v,{color:isPct&&typeof val==='number'?gc(val):'var(--md-on-surface)'});
    v.textContent=isPct?fmtPct(val):(val||'—');
    c.appendChild(l);c.appendChild(v);sg.appendChild(c);
  });
  panel.appendChild(sg);

  // AI
  const aiH=el('div','dp-ai-header');
  aiH.appendChild(el('div','dp-ai-dot','✦'));
  aiH.appendChild(el('div','dp-ai-label','AI Analysis'));
  panel.appendChild(aiH);

  const ai=S.aiCache[sym];
  if(S.aiLoading&&!ai){
    const ld=el('div','dp-loading');
    ld.appendChild(el('div','spin','⟳',{fontSize:'28px',display:'block'}));
    ld.appendChild(el('div','dp-loading-txt','Analysing this ETF…'));
    panel.appendChild(ld);
  }else if(ai){
    if(ai.error){
      const err=el('div','',null,{fontSize:'13px',color:'var(--md-error)',padding:'8px 0'});err.textContent='Analysis unavailable. Please try again.';panel.appendChild(err);
    }else{
      // Risk badge
      const br=el('div','dp-badges');
      const riskColors={'Low':{bg:st.bg,color:st.color},'Medium':{bg:'#FFE1BB',color:'#6A3A00'},'High':{bg:'#FFD8D8',color:'#8B0000'}};
      const rc=riskColors[ai.risk_level]||riskColors['Medium'];
      const rb2=el('div','dp-badge');sty(rb2,{background:rc.bg,color:rc.color});rb2.textContent=`⚡ ${ai.risk_level||'?'} Risk`;
      br.appendChild(rb2);br.appendChild(el('div','dp-horiz',`⏱ ${ai.investment_horizon||'—'}`));
      panel.appendChild(br);

      // What + Suited
      [['What does this ETF do?',ai.what],['Who should invest in this?',ai.suitable_for]].forEach(([title,body])=>{
        if(!body)return;
        const sec=el('div','dp-ai-sec');
        sec.appendChild(el('div','dp-ai-sec-title',title));
        const bd=el('div','dp-ai-body');bd.textContent=body;sec.appendChild(bd);
        panel.appendChild(sec);
      });

      // Pros
      if(ai.pros?.length){
        const ps=el('div','',null,{marginBottom:'14px'});
        const t=el('div','dp-list-title');sty(t,{color:'#2E7D32'});t.textContent='✓ Why this could be good for you';ps.appendChild(t);
        ai.pros.forEach(p=>{
          const row=el('div','dp-list-item');
          const d=el('div','dp-dot');sty(d,{background:'#2E7D32'});
          row.appendChild(d);row.appendChild(document.createTextNode(p));ps.appendChild(row);
        });panel.appendChild(ps);
      }
      // Cons
      if(ai.cons?.length){
        const cs2=el('div','',null,{marginBottom:'16px'});
        const t=el('div','dp-list-title');sty(t,{color:'#B71C1C'});t.textContent='⚠ Things to be careful about';cs2.appendChild(t);
        ai.cons.forEach(c=>{
          const row=el('div','dp-list-item');
          const d=el('div','dp-dot');sty(d,{background:'#B71C1C'});
          row.appendChild(d);row.appendChild(document.createTextNode(c));cs2.appendChild(row);
        });panel.appendChild(cs2);
      }
      panel.appendChild(el('div','dp-disc','⚠ AI-generated analysis for educational purposes only. Not financial or investment advice. Consult a SEBI-registered advisor before investing.'));
    }
  }else{
    const ld=el('div','dp-loading');
    ld.appendChild(el('div','spin','⟳',{fontSize:'28px',display:'block'}));
    ld.appendChild(el('div','dp-loading-txt','Loading analysis…'));
    panel.appendChild(ld);
  }
  return panel;
}

// ─── Boot ─────────────────────────────────────────────────
render();autoLoad();
</script>
</body>
